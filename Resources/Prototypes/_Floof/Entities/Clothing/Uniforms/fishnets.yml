# outerwear
- type: entity
  parent: ClothingOuterBase
  id: ClothingUniformFishnet
  name: Fishnet Top
  description: "A fishnet top with a bra so you can show off those important assets."
  components:
  - type: Sprite
    sprite: _Floof/Clothing/Uniforms/fishnet.rsi
    layers:
    - state: icon
  - type: Clothing
    sprite: _Floof/Clothing/Uniforms/fishnet.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING

- type: entity
  parent: ClothingOuterBase
  id: ClothingUniformFishnetAlt
  name: Fishnet Top Alt
  description: "An alternate version of the fishent top that allows for better view of your assets but was made with cheaper materials."
  components:
  - type: Sprite
    sprite: _Floof/Clothing/Uniforms/fishnet_alt.rsi
  - type: Clothing
    sprite: _Floof/Clothing/Uniforms/fishnet_alt.rsi

- type: entity
